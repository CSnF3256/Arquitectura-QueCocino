service: quecocino-recomendador
frameworkVersion: '3'

provider:
  name: aws
  runtime: python3.12
  region: us-east-1
  environment:
    QUEUE_NAME: recommendation-requested

functions:
  recomendar:
    handler: handler.lambda_handler
    description: Procesa solicitudes de recomendación desde SQS en el despliegue AWS objetivo.
    events:
      - sqs:
          arn:
            Fn::GetAtt:
              - RecommendationRequestedQueue
              - Arn
          batchSize: 1

resources:
  Resources:
    RecommendationRequestedQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: recommendation-requested
        VisibilityTimeout: 60
    RecommendationGeneratedQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: recommendation-generated
        VisibilityTimeout: 60
